syntax = "proto3";

package main;
option go_package = "grpc-srv/protoc;mainpb";

import "user/user.proto";

service Greeter {
    rpc SayHello(HelloRequest) returns (HelloResponse);
}

message HelloRequest {
    string name = 1;
    int32 age = 2;  
}

message HelloResponse {
    string connf_message = 1;
}

message UserProfile {
  string username = 1;
  string email = 2;
  user.User user = 3;
}