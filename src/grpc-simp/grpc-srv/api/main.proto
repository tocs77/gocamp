syntax = "proto3";

import "greeter.proto";
import "google/api/annotations.proto";

package calculator;
option go_package = "grpc-srv/;mainapipb";


service Calculate {
    rpc Add(AddRequest) returns (AddResponse);
    rpc GenerateFibonacci(FibonacciRequest) returns (stream FibonacciResponse);
    rpc SendNumbers (stream NumberRequest) returns (stream NumberResponse);
    rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}

service Greeter {
    rpc Greet(HelloRequest) returns (HelloResponse) {
        option (google.api.http) = {
            post: "/v1/calculate/greet"
            body: "*"
        };
    }
}

message FibonacciRequest {
    int32 n = 1;
}

message FibonacciResponse {
    int32 number = 1;
}

message NumberRequest {
    int32 number = 1;
}

message NumberResponse {
    int32 number = 1;
    int32 sum = 2;
}

message AddRequest {
    int32 a = 1;
    int32 b = 2;
}

message AddResponse {
    int32 sum = 1;
}

message ChatMessage {
    string message = 1;
}